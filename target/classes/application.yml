server:
  port: 8081

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/antiguedades}
    username: ${SPRING_DATASOURCE_USERNAME:antiguedades}
    password: ${SPRING_DATASOURCE_PASSWORD:antiguedades_secret}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET:base64-encoded-256-bit-secret-for-jwt-signing-at-least-32-chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

logging:
  level:
    com.antiguedades: DEBUG
    org.springframework.security: INFO
    org.flywaydb: DEBUG
