services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: antiguedades
      POSTGRES_USER: antiguedades_migrator
      POSTGRES_PASSWORD: ${MIGRATION_DB_PASSWORD}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U antiguedades_migrator -d antiguedades"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["full"]
    build: .
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/antiguedades
      SPRING_FLYWAY_URL: jdbc:postgresql://db:5432/antiguedades
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
