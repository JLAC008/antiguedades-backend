server:
  port: 8081

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
  flyway:
    url: ${SPRING_FLYWAY_URL:${SPRING_DATASOURCE_URL}}
    user: ${SPRING_FLYWAY_USER}
    password: ${SPRING_FLYWAY_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB

app:
  upload:
    dir: ${UPLOAD_DIR}
  superuser:
    username: ${SUPERUSER_USERNAME}
    password: ${SUPERUSER_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  auth:
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    cookie-name: ${AUTH_COOKIE_NAME:AUTH_TOKEN}
    login-max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    login-window-minutes: ${LOGIN_WINDOW_MINUTES:15}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

logging:
  level:
    com.antiguedades: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.flywaydb: INFO
